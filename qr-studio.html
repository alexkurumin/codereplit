<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>QR STUDIO // scanner terminal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
  :root{
    --bg: #05070b;
    --bg-grid: #070b12;
    --surface: #0e1520;
    --surface-2: #121b29;
    --border: #1d2a3d;
    --border-soft: #16202f;
    --text: #e7edf5;
    --muted: #6f7f95;
    --accent: #00e6c3;
    --accent-dim: #0a3d38;
    --accent2: #7b5bff;
    --danger: #ff5470;
    --radius: 18px;
    --radius-sm: 12px;
    font-size: 16px;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(0,230,195,0.08), transparent 45%),
      radial-gradient(circle at 90% 10%, rgba(123,91,255,0.10), transparent 40%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
    padding: 18px;
  }

  /* subtle circuit grid背景 */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 26px 26px;
    pointer-events:none;
    mask-image: radial-gradient(ellipse at 50% 0%, black 0%, transparent 70%);
  }

  .app{
    position:relative;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  /* ---------- header ---------- */
  .header{
    display:flex;
    align-items:center;
    gap:12px;
    padding: 4px 2px;
  }
  .logo{
    width:44px; height:44px;
    border-radius: 12px;
    background: linear-gradient(145deg, var(--surface-2), var(--surface));
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    color: var(--accent);
    box-shadow: 0 0 0 1px rgba(0,230,195,0.05), 0 0 18px rgba(0,230,195,0.12);
    flex-shrink:0;
  }
  .logo svg{ width:22px; height:22px; }
  .title-block h1{
    font-family:'Orbitron', sans-serif;
    font-size: 1.05rem;
    font-weight:700;
    letter-spacing: 0.12em;
    margin:0;
    color: var(--text);
  }
  .title-block p{
    margin:2px 0 0;
    font-size: 0.72rem;
    color: var(--muted);
    font-family:'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }
  .status-dot{
    margin-left:auto;
    display:flex; align-items:center; gap:6px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    color: var(--muted);
    letter-spacing:0.05em;
  }
  .status-dot span.dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }

  /* ---------- tabs ---------- */
  .tabs{
    position:relative;
    display:grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface);
    border:1px solid var(--border);
    border-radius: 14px;
    padding:4px;
  }
  .tab-indicator{
    position:absolute;
    top:4px; bottom:4px; left:4px;
    width: calc(50% - 4px);
    background: linear-gradient(135deg, var(--accent-dim), rgba(0,230,195,0.18));
    border:1px solid rgba(0,230,195,0.4);
    border-radius: 10px;
    transition: transform 0.35s cubic-bezier(.65,0,.35,1);
    z-index:0;
  }
  .tab-indicator.right{ transform: translateX(100%); }
  .tab-btn{
    position:relative; z-index:1;
    border:none; background:transparent;
    color: var(--muted);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:0.85rem;
    letter-spacing:0.03em;
    padding: 11px 0;
    display:flex; align-items:center; justify-content:center; gap:7px;
    cursor:pointer;
    transition: color 0.25s ease;
  }
  .tab-btn svg{ width:16px; height:16px; }
  .tab-btn.active{ color: var(--accent); }

  /* ---------- panels ---------- */
  .panel{ display:none; flex-direction:column; gap:14px; animation: fadeUp 0.35s ease; }
  .panel.active{ display:flex; }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .card{
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border:1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    position:relative;
    overflow:hidden;
  }
  .card-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .card-label::before{
    content:""; width:6px; height:6px; background:var(--accent); border-radius:1px;
    box-shadow: 0 0 6px var(--accent);
  }

  textarea#qr-input{
    width:100%;
    resize:none;
    min-height: 78px;
    background: var(--bg-grid);
    border:1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family:'Inter', sans-serif;
    font-size:0.9rem;
    padding: 12px 14px;
    outline:none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  textarea#qr-input:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,230,195,0.12);
  }
  textarea#qr-input::placeholder{ color:#3d4a5c; }

  .char-count{
    text-align:right;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    color: var(--muted);
    margin-top:6px;
  }

  .btn-primary{
    width:100%;
    margin-top:12px;
    border:none;
    border-radius: var(--radius-sm);
    padding: 13px 0;
    background: linear-gradient(135deg, var(--accent), #00b39c);
    color: #04140f;
    font-weight:700;
    font-size:0.88rem;
    letter-spacing:0.03em;
    display:flex; align-items:center; justify-content:center; gap:8px;
    cursor:pointer;
    box-shadow: 0 4px 20px rgba(0,230,195,0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:active{ transform: scale(0.97); }
  .btn-primary svg{ width:17px; height:17px; }

  /* ---------- scan frame (shared visual language) ---------- */
  .scan-frame{
    position:relative;
    width:100%;
    aspect-ratio: 1 / 1;
    max-width: 260px;
    margin: 6px auto 0;
    background: #030507;
    border-radius: var(--radius-sm);
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--border-soft);
  }
  .scan-frame .corner{
    position:absolute;
    width:22px; height:22px;
    border: 2.5px solid var(--accent);
    z-index:3;
    filter: drop-shadow(0 0 4px rgba(0,230,195,0.6));
  }
  .corner.tl{ top:8px; left:8px; border-right:none; border-bottom:none; border-top-left-radius:6px; }
  .corner.tr{ top:8px; right:8px; border-left:none; border-bottom:none; border-top-right-radius:6px; }
  .corner.bl{ bottom:8px; left:8px; border-right:none; border-top:none; border-bottom-left-radius:6px; }
  .corner.br{ bottom:8px; right:8px; border-left:none; border-top:none; border-bottom-right-radius:6px; }

  .laser{
    position:absolute;
    left:6%; right:6%;
    height:2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 12px 2px rgba(0,230,195,0.7);
    z-index:2;
    animation: sweep 2.6s ease-in-out infinite;
    opacity:0.9;
  }
  @keyframes sweep{
    0%{ top:8%; }
    50%{ top:92%; }
    100%{ top:8%; }
  }
  @media (prefers-reduced-motion: reduce){
    .laser{ animation:none; top:50%; }
    .status-dot span.dot{ animation:none; }
  }

  #qrcode-box{ display:flex; align-items:center; justify-content:center; }
  #qrcode-box img, #qrcode-box canvas{
    border-radius: 6px;
    background:#fff;
    padding:10px;
    max-width:100%;
    height:auto !important;
    width:auto !important;
  }
  .scan-frame.empty-state{ }
  .empty-hint{
    color: var(--muted);
    font-size:0.75rem;
    font-family:'JetBrains Mono', monospace;
    text-align:center;
    padding:0 20px;
    z-index:1;
  }

  #reader{ width:100%; height:100%; }
  #reader video, #reader canvas{
    width:100% !important; height:100% !important;
    object-fit:cover;
    border-radius: 10px;
  }
  #reader__scan_region{ border-radius:10px; }
  #reader__dashboard{ display:none !important; }

  /* ---------- action row ---------- */
  .actions{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    margin-top:14px;
  }
  .actions.single{ grid-template-columns: 1fr; }
  .action-btn{
    display:flex; align-items:center; justify-content:center; gap:7px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 11px 0;
    font-size:0.82rem;
    font-weight:600;
    font-family:'Inter', sans-serif;
    cursor:pointer;
    transition: border-color 0.2s ease, transform 0.15s ease, color 0.2s ease;
  }
  .action-btn svg{ width:15px; height:15px; }
  .action-btn:active{ transform: scale(0.96); }
  .action-btn:hover{ border-color: var(--accent); color: var(--accent); }
  .action-btn.danger:hover{ border-color: var(--danger); color: var(--danger); }

  .scan-toggle{
    width:100%;
    margin-top:14px;
    border:none;
    border-radius: var(--radius-sm);
    padding: 13px 0;
    background: var(--surface-2);
    border:1px solid var(--accent);
    color: var(--accent);
    font-weight:700;
    font-size:0.88rem;
    letter-spacing:0.03em;
    display:flex; align-items:center; justify-content:center; gap:8px;
    cursor:pointer;
  }
  .scan-toggle.stop{ border-color: var(--danger); color: var(--danger); }
  .scan-toggle svg{ width:17px; height:17px; }

  .result-box{
    margin-top:14px;
    background: var(--bg-grid);
    border:1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.82rem;
    color: var(--text);
    word-break: break-all;
    max-height: 90px;
    overflow-y:auto;
    display:none;
  }
  .result-box.show{ display:block; }

  footer.hint{
    text-align:center;
    color: var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.05em;
    padding: 4px 0 12px;
  }

  /* ---------- toast ---------- */
  #toast{
    position:fixed;
    bottom:22px; left:50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface-2);
    border:1px solid var(--accent);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    font-size:0.8rem;
    font-family:'Inter', sans-serif;
    display:flex; align-items:center; gap:8px;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    z-index:50;
    max-width: 90vw;
  }
  #toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }
  #toast svg{ width:15px; height:15px; color:var(--accent); flex-shrink:0; }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="logo"><svg data-lucide="scan-line"></svg></div>
    <div class="title-block">
      <h1>QR STUDIO</h1>
      <p>gerar // ler // compartilhar</p>
    </div>
    <div class="status-dot"><span class="dot"></span>ONLINE</div>
  </div>

  <div class="tabs">
    <div class="tab-indicator" id="tab-indicator"></div>
    <button class="tab-btn active" data-tab="gerar"><svg data-lucide="qr-code"></svg>Gerar</button>
    <button class="tab-btn" data-tab="ler"><svg data-lucide="camera"></svg>Ler</button>
  </div>

  <!-- ================= PAINEL GERAR ================= -->
  <div class="panel active" id="panel-gerar">
    <div class="card">
      <div class="card-label">entrada de dados</div>
      <textarea id="qr-input" maxlength="700" placeholder="Cole um link, texto, Wi-Fi, contato..."></textarea>
      <div class="char-count"><span id="char-count">0</span>/700</div>
      <button class="btn-primary" id="btn-gerar"><svg data-lucide="zap"></svg>Gerar QR Code</button>
    </div>

    <div class="card">
      <div class="card-label">preview</div>
      <div class="scan-frame" id="qr-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="laser" id="qr-laser" style="display:none;"></div>
        <div id="qrcode-box"></div>
        <p class="empty-hint" id="qr-empty-hint">aguardando dados<br>para gerar o código</p>
      </div>

      <div class="actions" id="qr-actions" style="display:none;">
        <button class="action-btn" id="btn-baixar"><svg data-lucide="download"></svg>Baixar</button>
        <button class="action-btn" id="btn-compartilhar"><svg data-lucide="share-2"></svg>Compartilhar</button>
      </div>
    </div>
  </div>

  <!-- ================= PAINEL LER ================= -->
  <div class="panel" id="panel-ler">
    <div class="card">
      <div class="card-label">câmera</div>
      <div class="scan-frame" id="cam-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="laser" id="cam-laser" style="display:none;"></div>
        <div id="reader"></div>
        <p class="empty-hint" id="cam-empty-hint">toque em "Iniciar leitura"<br>para ativar a câmera</p>
      </div>

      <button class="scan-toggle" id="btn-scan"><svg data-lucide="video"></svg>Iniciar leitura</button>

      <div class="result-box" id="result-box"></div>

      <div class="actions" id="ler-actions" style="display:none;">
        <button class="action-btn" id="btn-copiar"><svg data-lucide="copy"></svg>Copiar</button>
        <button class="action-btn" id="btn-compartilhar-ler"><svg data-lucide="share-2"></svg>Compartilhar</button>
      </div>
    </div>
  </div>

  <footer class="hint">100% local · nenhum dado sai do seu dispositivo</footer>
</div>

<div id="toast"><svg data-lucide="check-circle"></svg><span id="toast-msg"></span></div>

<script>
lucide.createIcons();

/* ---------------- TOAST ---------------- */
let toastTimer;
function showToast(msg){
  const toast = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toast.classList.remove('show'), 2200);
}

/* ---------------- TABS ---------------- */
const tabBtns = document.querySelectorAll('.tab-btn');
const indicator = document.getElementById('tab-indicator');
const panels = { gerar: document.getElementById('panel-gerar'), ler: document.getElementById('panel-ler') };

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    indicator.classList.toggle('right', tab === 'ler');
    Object.entries(panels).forEach(([key,panel])=> panel.classList.toggle('active', key===tab));
    if(tab !== 'ler' && scanning) stopScan();
  });
});

/* ---------------- GERAR QR ---------------- */
const qrInput = document.getElementById('qr-input');
const charCount = document.getElementById('char-count');
const qrcodeBox = document.getElementById('qrcode-box');
const qrEmptyHint = document.getElementById('qr-empty-hint');
const qrLaser = document.getElementById('qr-laser');
const qrActions = document.getElementById('qr-actions');
let currentQRCanvas = null;

qrInput.addEventListener('input', ()=> charCount.textContent = qrInput.value.length);

document.getElementById('btn-gerar').addEventListener('click', ()=>{
  const value = qrInput.value.trim();
  if(!value){ showToast('Digite algo antes de gerar'); return; }

  qrcodeBox.innerHTML = '';
  qrLaser.style.display = 'block';
  qrEmptyHint.style.display = 'none';
  qrActions.style.display = 'none';

  setTimeout(()=>{
    new QRCode(qrcodeBox, {
      text: value,
      width: 200,
      height: 200,
      colorDark: "#04140f",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
    qrLaser.style.display = 'none';
    currentQRCanvas = qrcodeBox.querySelector('canvas');
    qrActions.style.display = 'grid';
    showToast('QR Code gerado');
  }, 550);
});

document.getElementById('btn-baixar').addEventListener('click', ()=>{
  if(!currentQRCanvas){ showToast('Gere um QR Code primeiro'); return; }
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = currentQRCanvas.toDataURL('image/png');
  link.click();
  showToast('Imagem baixada');
});

document.getElementById('btn-compartilhar').addEventListener('click', async ()=>{
  if(!currentQRCanvas){ showToast('Gere um QR Code primeiro'); return; }
  try{
    const blob = await new Promise(res => currentQRCanvas.toBlob(res, 'image/png'));
    const file = new File([blob], 'qrcode.png', { type: 'image/png' });
    if(navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({ files: [file], title: 'QR Code' });
    } else if(navigator.share){
      await navigator.share({ title: 'QR Code', text: qrInput.value.trim() });
    } else {
      await navigator.clipboard.writeText(qrInput.value.trim());
      showToast('Compartilhamento indisponível: texto copiado');
      return;
    }
    showToast('Compartilhado');
  } catch(err){
    if(err.name !== 'AbortError') showToast('Não foi possível compartilhar');
  }
});

/* ---------------- LER QR (câmera) ---------------- */
const btnScan = document.getElementById('btn-scan');
const camEmptyHint = document.getElementById('cam-empty-hint');
const camLaser = document.getElementById('cam-laser');
const resultBox = document.getElementById('result-box');
const lerActions = document.getElementById('ler-actions');
let html5QrCode;
let scanning = false;
let lastResult = '';

async function startScan(){
  try{
    html5QrCode = new Html5Qrcode("reader");
    camEmptyHint.style.display = 'none';
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 200, height: 200 } },
      onScanSuccess
    );
    scanning = true;
    camLaser.style.display = 'block';
    btnScan.classList.add('stop');
    btnScan.innerHTML = '<svg data-lucide="square"></svg>Parar leitura';
    lucide.createIcons();
  } catch(err){
    showToast('Não foi possível acessar a câmera');
    camEmptyHint.style.display = 'block';
  }
}

async function stopScan(){
  if(html5QrCode && scanning){
    try{ await html5QrCode.stop(); html5QrCode.clear(); } catch(e){}
  }
  scanning = false;
  camLaser.style.display = 'none';
  btnScan.classList.remove('stop');
  btnScan.innerHTML = '<svg data-lucide="video"></svg>Iniciar leitura';
  camEmptyHint.style.display = 'block';
  lucide.createIcons();
}

function onScanSuccess(decodedText){
  lastResult = decodedText;
  resultBox.textContent = decodedText;
  resultBox.classList.add('show');
  lerActions.style.display = 'grid';
  showToast('Código lido com sucesso');
  stopScan();
}

btnScan.addEventListener('click', ()=>{
  if(scanning) stopScan(); else startScan();
});

document.getElementById('btn-copiar').addEventListener('click', async ()=>{
  if(!lastResult) return;
  try{
    await navigator.clipboard.writeText(lastResult);
    showToast('Copiado para a área de transferência');
  } catch(e){ showToast('Não foi possível copiar'); }
});

document.getElementById('btn-compartilhar-ler').addEventListener('click', async ()=>{
  if(!lastResult) return;
  try{
    if(navigator.share){
      await navigator.share({ text: lastResult });
      showToast('Compartilhado');
    } else {
      await navigator.clipboard.writeText(lastResult);
      showToast('Compartilhamento indisponível: texto copiado');
    }
  } catch(err){
    if(err.name !== 'AbortError') showToast('Não foi possível compartilhar');
  }
});
</script>
</body>
</html>
