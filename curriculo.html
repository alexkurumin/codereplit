<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonCV | Gerador de Currículo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07070c;
            --bg-panel: #0f0f18;
            --bg-card: #161622;
            --border: #26263a;
            --text: #e8e8f0;
            --text-dim: #8a8a9a;
            --accent: #00f0ff;
            --accent2: #ff0080;
            --success: #00ff88;
            --glow: 0 0 30px rgba(0, 240, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 128, 0.06) 0%, transparent 50%);
        }

    .app {
            display: grid;
            grid-template-columns: 450px 1fr;
            min-height: 100vh;
        }

    .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            max-height: 100vh;
        }

    .header {
            margin-bottom: 2rem;
        }

    .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }

    .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

    .template-switcher {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

    .template-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

    .template-btn.active {
            border-color: var(--accent);
            background: rgba(0, 240, 255, 0.1);
            box-shadow: var(--glow);
        }

    .form-section {
            margin-bottom: 1.5rem;
        }

    .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    .form-group {
            margin-bottom: 1rem;
        }

    .form-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

    .form-input,.form-textarea {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

    .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

    .form-input:focus,.form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1);
        }

    .photo-upload {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 12px;
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
        }

    .photo-upload:hover {
            border-color: var(--accent);
        }

    .photo-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    .photo-upload input {
            display: none;
        }

    .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

    .btn:hover {
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.6);
            transform: translateY(-2px);
        }

    .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
        }

    .preview-area {
            padding: 2rem;
            overflow-y: auto;
            max-height: 100vh;
        }

    .cv-wrapper {
            background: white;
            max-width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* TEMPLATE 1: MINIMAL TECH */
    .cv-template-1 {
            padding: 40px;
            color: #1a1a2e;
            font-family: 'Poppins', sans-serif;
        }

    .cv-template-1.cv-header {
            border-bottom: 3px solid #00f0ff;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 30px;
            align-items: center;
        }

    .cv-template-1.cv-photo {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid #00f0ff;
        }

    .cv-template-1.cv-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 5px;
        }

    .cv-template-1.cv-title {
            font-size: 16px;
            color: #00f0ff;
            font-weight: 600;
        }

    .cv-template-1.cv-contact {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

    .cv-template-1.cv-section {
            margin-bottom: 25px;
        }

    .cv-template-1.cv-section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #00f0ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* TEMPLATE 2: NEON CARD */
    .cv-template-2 {
            background: linear-gradient(135deg, #0f0f18 0%, #1a1a2e 100%);
            color: white;
            padding: 0;
        }

    .cv-template-2.cv-header {
            background: linear-gradient(135deg, #00f0ff 0%, #ff0080 100%);
            padding: 40px;
            text-align: center;
        }

    .cv-template-2.cv-photo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-bottom: 15px;
        }

    .cv-template-2.cv-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 5px;
        }

    .cv-template-2.cv-content {
            padding: 40px;
        }

    .cv-template-2.cv-section-title {
            color: #00f0ff;
            border-left: 3px solid #ff0080;
            padding-left: 10px;
        }

        /* TEMPLATE 3: CORPORATE DARK */
    .cv-template-3 {
            display: grid;
            grid-template-columns: 35% 65%;
            min-height: 297mm;
        }

    .cv-template-3.cv-sidebar {
            background: #1a1a2e;
            color: white;
            padding: 40px 25px;
        }

    .cv-template-3.cv-main {
            padding: 40px;
            color: #1a1a2e;
        }

    .cv-template-3.cv-photo {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 20px;
        }

    .cv-template-3.cv-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 20px;
        }

    .cv-item {
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.6;
        }

    .cv-item-title {
            font-weight: 700;
            margin-bottom: 3px;
        }

    .cv-item-date {
            font-size: 11px;
            color: #888;
        }

        @media (max-width: 1024px) {
        .app {
                grid-template-columns: 1fr;
            }
        .sidebar {
                max-height: none;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }

        @media print {
            body {
                background: white;
            }
        .sidebar,.header,.btn {
                display: none!important;
            }
        .app {
                display: block;
            }
        .preview-area {
                padding: 0;
            }
        .cv-wrapper {
                box-shadow: none;
                margin: 0;
                max-width: 100%;
            }
        }

    .sidebar::-webkit-scrollbar,.preview-area::-webkit-scrollbar {
            width: 6px;
        }

    .sidebar::-webkit-scrollbar-track,.preview-area::-webkit-scrollbar-track {
            background: var(--bg);
        }

    .sidebar::-webkit-scrollbar-thumb,.preview-area::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="header">
                <h1 class="logo">NEONCV</h1>
                <p class="subtitle">Gerador de Currículo High-Tech</p>
            </div>

            <div class="template-switcher">
                <button class="template-btn active" data-template="1">Minimal</button>
                <button class="template-btn" data-template="2">Neon</button>
                <button class="template-btn" data-template="3">Corporate</button>
            </div>

            <div class="form-section">
                <h3 class="section-title"><i class="fa-solid fa-user"></i> Dados Pessoais</h3>
                <div class="form-group">
                    <label class="form-label">Foto</label>
                    <label class="photo-upload" for="photoInput">
                        <i class="fa-solid fa-camera" style="font-size:1.5rem;color:var(--text-dim);"></i>
                        <input type="file" id="photoInput" accept="image/*">
                    </label>
                </div>
                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-input" id="nome" placeholder="João Silva">
                </div>
                <div class="form-group">
                    <label class="form-label">Cargo Desejado</label>
                    <input type="text" class="form-input" id="cargo" placeholder="Desenvolvedor Full Stack">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="joao@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Telefone</label>
                    <input type="text" class="form-input" id="telefone" placeholder="(11) 99999-9999">
                </div>
                <div class="form-group">
                    <label class="form-label">LinkedIn/GitHub</label>
                    <input type="text" class="form-input" id="link" placeholder="linkedin.com/in/joao">
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title"><i class="fa-solid fa-file-lines"></i> Resumo Profissional</h3>
                <div class="form-group">
                    <textarea class="form-textarea" id="resumo" placeholder="Descreva sua experiência e objetivos..."></textarea>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title"><i class="fa-solid fa-briefcase"></i> Experiência</h3>
                <div class="form-group">
                    <textarea class="form-textarea" id="experiencia" placeholder="Empresa - Cargo (2020-2023)&#10;• Responsabilidade 1&#10;• Responsabilidade 2"></textarea>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title"><i class="fa-solid fa-graduation-cap"></i> Formação</h3>
                <div class="form-group">
                    <textarea class="form-textarea" id="formacao" placeholder="Universidade - Curso (2018-2022)"></textarea>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title"><i class="fa-solid fa-code"></i> Habilidades</h3>
                <div class="form-group">
                    <textarea class="form-textarea" id="habilidades" placeholder="JavaScript, React, Node.js, Python"></textarea>
                </div>
            </div>

            <button class="btn" onclick="exportPDF()">
                <i class="fa-solid fa-file-pdf"></i> EXPORTAR PDF
            </button>
            <button class="btn btn-secondary" style="margin-top:0.75rem;" onclick="clearData()">
                <i class="fa-solid fa-trash"></i> LIMPAR RASCUNHO
            </button>
        </aside>

        <main class="preview-area">
            <div class="cv-wrapper" id="cvPreview"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        let currentTemplate = 1;
        let cvData = {
            nome: '', cargo: '', email: '', telefone: '', link: '',
            resumo: '', experiencia: '', formacao: '', habilidades: '', foto: ''
        };

        // Carrega rascunho
        const loadDraft = () => {
            const saved = localStorage.getItem('neoncv-draft');
            if (saved) {
                cvData = JSON.parse(saved);
                Object.keys(cvData).forEach(key => {
                    const el = document.getElementById(key);
                    if (el && key!== 'foto') el.value = cvData[key];
                });
                if (cvData.foto) {
                    document.querySelector('.photo-upload').innerHTML = `<img src="${cvData.foto}">`;
                }
            }
            renderCV();
        };

        const saveDraft = () => {
            localStorage.setItem('neoncv-draft', JSON.stringify(cvData));
        };

        const updateData = (key, value) => {
            cvData[key] = value;
            saveDraft();
            renderCV();
        };

        // Foto upload
        document.getElementById('photoInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    cvData.foto = ev.target.result;
                    document.querySelector('.photo-upload').innerHTML = `<img src="${cvData.foto}">`;
                    saveDraft();
                    renderCV();
                };
                reader.readAsDataURL(file);
            }
        };

        // Inputs
        ['nome','cargo','email','telefone','link','resumo','experiencia','formacao','habilidades'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => updateData(id, e.target.value));
        });

        // Templates
        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTemplate = parseInt(btn.dataset.template);
                renderCV();
            };
        });

        const renderCV = () => {
            const wrapper = document.getElementById('cvPreview');
            const d = cvData;

            if (currentTemplate === 1) {
                wrapper.innerHTML = `
                    <div class="cv-template-1">
                        <div class="cv-header">
                            ${d.foto? `<img src="${d.foto}" class="cv-photo">` : ''}
                            <div>
                                <div class="cv-name">${d.nome || 'Seu Nome'}</div>
                                <div class="cv-title">${d.cargo || 'Seu Cargo'}</div>
                                <div class="cv-contact">
                                    ${d.email? `<i class="fa-solid fa-envelope"></i> ${d.email} ` : ''}
                                    ${d.telefone? `<i class="fa-solid fa-phone"></i> ${d.telefone} ` : ''}
                                    ${d.link? `<i class="fa-solid fa-link"></i> ${d.link}` : ''}
                                </div>
                            </div>
                        </div>
                        ${d.resumo? `<div class="cv-section"><div class="cv-section-title">Resumo</div><div class="cv-item">${d.resumo.replace(/\n/g,'<br>')}</div></div>` : ''}
                        ${d.experiencia? `<div class="cv-section"><div class="cv-section-title">Experiência</div><div class="cv-item">${d.experiencia.replace(/\n/g,'<br>')}</div></div>` : ''}
                        ${d.formacao? `<div class="cv-section"><div class="cv-section-title">Formação</div><div class="cv-item">${d.formacao.replace(/\n/g,'<br>')}</div></div>` : ''}
                        ${d.habilidades? `<div class="cv-section"><div class="cv-section-title">Habilidades</div><div class="cv-item">${d.habilidades.replace(/\n/g,'<br>')}</div></div>` : ''}
                    </div>
                `;
            } else if (currentTemplate === 2) {
                wrapper.innerHTML = `
                    <div class="cv-template-2">
                        <div class="cv-header">
                            ${d.foto? `<img src="${d.foto}" class="cv-photo">` : ''}
                            <div class="cv-name">${d.nome || 'Seu Nome'}</div>
                            <div class="cv-title">${d.cargo || 'Seu Cargo'}</div>
                            <div style="font-size:12px;margin-top:10px;opacity:0.9;">
                                ${d.email? `${d.email} • ` : ''}${d.telefone? `${d.telefone} • ` : ''}${d.link || ''}
                            </div>
                        </div>
                        <div class="cv-content">
                            ${d.resumo? `<div class="cv-section"><div class="cv-section-title">Sobre Mim</div><div class="cv-item">${d.resumo.replace(/\n/g,'<br>')}</div></div>` : ''}
                            ${d.experiencia? `<div class="cv-section"><div class="cv-section-title">Experiência</div><div class="cv-item">${d.experiencia.replace(/\n/g,'<br>')}</div></div>` : ''}
                            ${d.formacao? `<div class="cv-section"><div class="cv-section-title">Formação</div><div class="cv-item">${d.formacao.replace(/\n/g,'<br>')}</div></div>` : ''}
                            ${d.habilidades? `<div class="cv-section"><div class="cv-section-title">Skills</div><div class="cv-item">${d.habilidades.replace(/\n/g,'<br>')}</div></div>` : ''}
                        </div>
                    </div>
                `;
            } else {
                wrapper.innerHTML = `
                    <div class="cv-template-3">
                        <div class="cv-sidebar">
                            ${d.foto? `<img src="${d.foto}" class="cv-photo">` : ''}
                            <div class="cv-name">${d.nome || 'Seu Nome'}</div>
                            <div style="color:#00f0ff;margin-bottom:20px;font-size:14px;">${d.cargo || 'Seu Cargo'}</div>
                            <div style="font-size:12px;line-height:2;">
                                ${d.email? `<div><i class="fa-solid fa-envelope"></i> ${d.email}</div>` : ''}
                                ${d.telefone? `<div><i class="fa-solid fa-phone"></i> ${d.telefone}</div>` : ''}
                                ${d.link? `<div><i class="fa-solid fa-link"></i> ${d.link}</div>` : ''}
                            </div>
                            ${d.habilidades? `<div style="margin-top:30px;"><div class="cv-section-title" style="color:#00f0ff;margin-bottom:10px;">Habilidades</div><div style="font-size:12px;">${d.habilidades.replace(/\n/g,'<br>')}</div></div>` : ''}
                        </div>
                        <div class="cv-main">
                            ${d.resumo? `<div class="cv-section"><div class="cv-section-title" style="color:#1a1a2e;border-bottom:2px solid #00f0ff;padding-bottom:5px;">Perfil</div><div class="cv-item">${d.resumo.replace(/\n/g,'<br>')}</div></div>` : ''}
                            ${d.experiencia? `<div class="cv-section"><div class="cv-section-title" style="color:#1a1a2e;border-bottom:2px solid #00f0ff;padding-bottom:5px;">Experiência</div><div class="cv-item">${d.experiencia.replace(/\n/g,'<br>')}</div></div>` : ''}
                            ${d.formacao? `<div class="cv-section"><div class="cv-section-title" style="color:#1a1a2e;border-bottom:2px solid #00f0ff;padding-bottom:5px;">Formação</div><div class="cv-item">${d.formacao.replace(/\n/g,'<br>')}</div></div>` : ''}
                        </div>
                    </div>
                `;
            }
        };

        const exportPDF = () => {
            showToast('Abrindo diálogo de impressão...', 'success');
            setTimeout(() => window.print(), 300);
        };

        const clearData = () => {
            if (confirm('Tem certeza que quer limpar todos os dados?')) {
                localStorage.removeItem('neoncv-draft');
                location.reload();
            }
        };

        const showToast = (text, type) => {
            Toastify({
                text, duration: 2500, gravity: "bottom", position: "center",
                style: {
                    background: type === 'success'? 'linear-gradient(90deg, #00f0ff, #00ff88)' : 'linear-gradient(90deg, #ff0080, #ff3d71)',
                    fontWeight: '700'
                }
            }).showToast();
        };

        // Init
        loadDraft();
    </script>
</body>
</html>
